[pytest]
# -n auto: Run tests in parallel using all available CPU cores (requires pytest-xdist)
# --browser: Tell playwright to run against chromium, firefox, and webkit
# --alluredir: Generate Allure results for enterprise reporting
# -p utils.premium_report: Register the premium HTML report plugin
addopts = -n auto --browser chromium --browser firefox --browser webkit --alluredir=allure-results -p utils.premium_report

# Register the bdd feature files path
bdd_features_base_dir = features/

# Premium Report output path
premium_report_path = reports/premium_report.html

# Custom Markers
markers =
    ui: mark test as a UI test (requires a browser)
    api: mark test as an API test (fast, no browser needed)
    a11y: mark test as an Accessibility test (WCAG compliance)
