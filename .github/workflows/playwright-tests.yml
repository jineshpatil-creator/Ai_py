name: Playwright AI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

# Grant permissions for GitHub Pages deployment
permissions:
  contents: write
  pages: write

jobs:
  test:
    name: Run QA Automation Suite
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure browsers are installed
      run: python -m playwright install

    - name: Run Pytest Suite
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python -m pytest tests/ --html=report.html --self-contained-html --alluredir=allure-results -v

    - name: Upload HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report
        path: report.html
        retention-days: 14

    - name: Upload Premium Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: premium-report
        path: reports/premium_report.html
        retention-days: 14

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: allure-results/
        retention-days: 14

    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always() && github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
